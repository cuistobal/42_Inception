events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    # Docker's embedded DNS resolver so nginx can resolve service names at runtime
    resolver 127.0.0.11 valid=30s;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name chrleroy.42.fr 192.168.56.101 localhost 127.0.0.1;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /var/www/html;
        index index.php index.html index.htm;

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            # Use variables for the upstream so nginx resolves the service name at runtime
            set $upstream_host "wordpress";
            set $upstream_port 9000;
            fastcgi_pass $upstream_host:$upstream_port;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
